<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brightspace - CSS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; background: #f5f6f8; }

  .topbar {
    background: #fff; display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
  }
  .logo { color: #d6002a; font-weight: bold; font-style: italic; line-height: 1; }
  .logo .name { font-size: 38px; letter-spacing: -1px; }
  .logo .sub { font-size: 17px; display: block; text-align: right; margin-top: 2px; }

  .top-right { display: flex; align-items: center; gap: 22px; }
  .top-right .icon { color: #444; font-size: 22px; }
  .sep { color: #d0d0d0; font-size: 16px; }
  .profile { display: flex; align-items: center; gap: 12px; }
  .profile .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #b9c4d0; color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    object-fit: cover;
  }
  .profile .pname { color: #333; font-size: 17px; }

  .navbar { background: #d6002a; display: flex; gap: 38px; padding: 14px 40px; }
  .navbar a { color: #fff; text-decoration: none; font-size: 17px; }
  .navbar a:hover { text-decoration: underline; }

  .content { padding: 40px; }
  .card {
    background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    display: flex; align-items: center; gap: 50px; padding: 40px 60px;
  }
  .card .megaphone { color: #d6002a; font-size: 46px; transform: rotate(-8deg); }
  .card .lines { flex: 1; text-align: center; }
  .card .lines p { font-size: 19px; color: #333; margin: 12px 0; }
  .card .lines a { color: #0a6cff; text-decoration: none; }
  .card .lines a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <span class="name">avans</span>
      <span class="sub">hogeschool</span>
    </div>
    <div class="top-right">
      <i class="fa-solid fa-grip icon"></i>
      <i class="fa-solid fa-ellipsis-vertical sep"></i>
      <i class="fa-regular fa-comment icon"></i>
      <i class="fa-regular fa-bell icon"></i>
      <i class="fa-solid fa-ellipsis-vertical sep"></i>
      <div class="profile">
        <div class="avatar"><i class="fa-solid fa-user"></i></div>
        <span class="pname">Pluk Zwaal</span>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <a href="#">ePortfolio</a>
    <a href="#">Xplora</a>
    <a href="#">Help <i class="fa-solid fa-chevron-down" style="font-size:12px;"></i></a>
  </nav>

  <div class="content">
    <div class="card">
      <i class="fa-solid fa-bullhorn megaphone"></i>
      <div class="lines">
        <p>Heb je een digitale toets? Bereid je voor en lees de informatie op <a href="#">digitaaltoetsen.avans.nl</a></p>
        <p>Do you have a digital exam? Be prepared and read the information on <a href="#">digitaaltoetsen.avans.nl</a></p>
      </div>
    </div>
  </div>
</body>
</html>
