<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brightspace - Tailwind</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-[#f5f6f8] font-sans">
  <div class="bg-white flex items-center justify-between px-10 py-[18px]">
    <div class="text-[#d6002a] font-bold italic leading-none">
      <span class="text-[38px] tracking-tight">avans</span>
      <span class="block text-right text-[17px] mt-0.5">hogeschool</span>
    </div>
    <div class="flex items-center gap-[22px]">
      <i class="fa-solid fa-grip text-[#444] text-[22px]"></i>
      <i class="fa-solid fa-ellipsis-vertical text-[#d0d0d0]"></i>
      <i class="fa-regular fa-comment text-[#444] text-[22px]"></i>
      <i class="fa-regular fa-bell text-[#444] text-[22px]"></i>
      <i class="fa-solid fa-ellipsis-vertical text-[#d0d0d0]"></i>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-[#b9c4d0] text-white flex items-center justify-center text-lg"><i class="fa-solid fa-user"></i></div>
        <span class="text-[#333] text-[17px]">Pluk Zwaal</span>
      </div>
    </div>
  </div>

  <nav class="bg-[#d6002a] flex gap-[38px] px-10 py-[14px]">
    <a href="#" class="text-white text-[17px] hover:underline">ePortfolio</a>
    <a href="#" class="text-white text-[17px] hover:underline">Xplora</a>
    <a href="#" class="text-white text-[17px] hover:underline">Help <i class="fa-solid fa-chevron-down text-xs"></i></a>
  </nav>

  <div class="p-10">
    <div class="bg-white rounded-lg shadow-sm flex items-center gap-[50px] px-[60px] py-10">
      <i class="fa-solid fa-bullhorn text-[#d6002a] text-[46px] -rotate-[8deg]"></i>
      <div class="flex-1 text-center">
        <p class="text-[19px] text-[#333] my-3">Heb je een digitale toets? Bereid je voor en lees de informatie op <a href="#" class="text-[#0a6cff] hover:underline">digitaaltoetsen.avans.nl</a></p>
        <p class="text-[19px] text-[#333] my-3">Do you have a digital exam? Be prepared and read the information on <a href="#" class="text-[#0a6cff] hover:underline">digitaaltoetsen.avans.nl</a></p>
      </div>
    </div>
  </div>
</body>
</html>
